id: silent_null_payments
category: silent_null
description: >
  From 2026-06-28 the payments feed delivers NULL amounts on ~30% of
  successful payments. stg_payments filters on status='success' but never
  checks amount (and there is no not_null test on it), so the NULLs flow
  downstream where SUM() skips them silently — revenue drops, all tests green.
injection:
  type: data_mutation
  target: raw_payments
  action: null_column
  params:
    key_column: payment_id
    column: amount
    fraction: 0.3
    filter: "status = 'success' and paid_at >= '2026-06-28'"
symptom:
  metric: mart_revenue_daily.total_revenue
  # Measured on the live seed (deterministic): -26% to -35% per post-onset day
  # (min -26.6% on 06-29, max -34.5% on 07-09), typically ~-30% (the nulled
  # 30% of payment rows carry ~30% of revenue).
  expected_deviation: "-26-35%"
  onset: "2026-06-28"
ground_truth:
  root_cause_model: stg_payments
  root_cause_mechanism: >
    NULL amounts on status='success' rows pass the stg_payments success filter
    unchecked — there is no not_null test or guard on amount — and downstream
    SUM(amount) in int_orders_joined skips NULLs silently, understating
    order_revenue and daily total_revenue.
  acceptable_fixes:
    - add a not_null test on stg_payments.amount so the load fails loudly
    - exclude or quarantine success rows with NULL amount in stg_payments and reconcile against the provider feed
difficulty: medium
